# proxsyno — TLS reverse proxy (nginx)
#
#   sudo cp nginx-proxsyno.conf /etc/nginx/sites-available/proxsyno
#   sudo ln -s /etc/nginx/sites-available/proxsyno /etc/nginx/sites-enabled/
#   # provide a certificate (Let's Encrypt via certbot, or a self-signed pair —
#   # see the bottom of this file), edit server_name + the ssl_* paths, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# THEN flip proxsyno onto HTTPS mode:
#   echo 'COOKIE_SECURE=true' | sudo tee -a /etc/proxsyno/proxsyno.env
#   sudo systemctl restart proxsyno
#
# This enables the Secure cookie, the __Host- cookie prefix, and HSTS.

# Maps the Upgrade request header to the Connection response header for WebSockets.
# Must live at http{} scope — keep it outside the server blocks below.
map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

# Redirect plain HTTP to HTTPS.
server {
	listen 80;
	listen [::]:80;
	server_name nas.example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name nas.example.com;

	# TLS certificate (certbot writes exactly these paths):
	ssl_certificate     /etc/letsencrypt/live/nas.example.com/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/nas.example.com/privkey.pem;
	ssl_protocols       TLSv1.2 TLSv1.3;

	# proxsyno streams large uploads — match its MAX_UPLOAD_BYTES (default 5 GiB).
	client_max_body_size 5g;

	location / {
		proxy_pass http://127.0.0.1:8800;
		proxy_http_version 1.1;

		# Preserve the client Host: proxsyno's CSRF check compares Origin == Host,
		# and the __Host- cookie is scoped to this exact name.
		proxy_set_header Host              $host;

		# Forward the REAL client IP. proxsyno trusts one proxy hop and keys its
		# per-IP brute-force lockout on this — without it every client shares the
		# proxy's IP and one attacker would lock out everyone.
		proxy_set_header X-Real-IP         $remote_addr;
		proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;

		# WebSocket upgrades: /ws/system, /ws/pve/console, /ws/proxmox/console.
		proxy_set_header Upgrade    $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		# Consoles and the live stats stream are long-lived; don't cut them at 60s.
		proxy_read_timeout 3600s;
		proxy_send_timeout 3600s;

		# Stream rather than buffer (VNC/console latency + large uploads).
		proxy_buffering         off;
		proxy_request_buffering off;
	}
}

# --- LAN-only, no public DNS / Let's Encrypt? --------------------------------
# Generate a self-signed certificate and point ssl_certificate(_key) at it:
#
#   sudo openssl req -x509 -nodes -days 825 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/proxsyno.key \
#     -out    /etc/ssl/certs/proxsyno.crt \
#     -subj "/CN=nas.local"
#
#   ssl_certificate     /etc/ssl/certs/proxsyno.crt;
#   ssl_certificate_key /etc/ssl/private/proxsyno.key;
#
# Browsers will warn until you import the cert as trusted.
